<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <title>Admin</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <div class="page">

        <header class="main-header">

            <div class="header-inner">

                <div class="header-left">
                    <span id="adminName"></span>
                </div>

                <div class="header-credits">
                    Admin Dashboard
                </div>

                <div class="header-right">
                    <button onclick="goToShop()" class="header-btn">
                        Shop
                    </button>

                    <button onclick="openOrders()" class="header-btn">
                        Storico acquisti
                    </button>

                    <button onclick="openUsers()" class="header-btn">
                        Utenti
                    </button>

                    <button onclick="logout()" class="header-btn logout">
                        Logout
                    </button>

                </div>

            </div>

        </header>

        <h1 class="shop-title">Gestione prodotti</h1>

        <div class="admin-box">

            <h2>Aggiungi prodotto</h2>

            <input id="name" placeholder="Nome prodotto">
            <input id="price" placeholder="Prezzo">
            <input id="stock" placeholder="Quantità">

            <button onclick="addProduct()" class="product-btn">
                Aggiungi prodotto
            </button>

        </div>

        <div class="admin-box">

            <h2>Prodotti</h2>

            <div id="products"></div>

        </div>

        <div id="usersSection" class="admin-box" style="display:none">

            <h2>Utenti</h2>

            <input id="searchUsers" placeholder="Cerca nome o email">

            <div id="users"></div>

        </div>

        <div id="ordersSection" class="admin-box" style="display:none">

            <h2>Storico acquisti</h2>

            <input id="searchOrders" placeholder="Cerca nome o email">

            <div id="orders"></div>

        </div>

        <p id="message"></p>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>

</body>

</html>
